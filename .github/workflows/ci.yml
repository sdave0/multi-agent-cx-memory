name: MindCX CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    env:
      EVAL_MODE: mock
      PYTHONPATH: .
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-asyncio pytest-mock

      - name: Run pytest
        run: pytest tests/

      - name: Run evaluation harness
        run: python -m evals.run

      - name: Generate Evaluation Dashboard
        run: python evals/generate_report.py
        if: always()

      - name: Upload Evaluation Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report
          path: evals/results/eval_dashboard.md

  frontend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run Frontend Typecheck
        working-directory: ./frontend
        run: npm run typecheck
