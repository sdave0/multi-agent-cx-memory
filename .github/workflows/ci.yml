name: Nexus Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-asyncio

      - name: Run pytest
        run: PYTHONPATH=. pytest backend/tests/

      - name: Run evaluation harness
        run: python -m backend.evals.run

      - name: Generate Evaluation Dashboard
        run: python backend/evals/generate_report.py
        if: always()

      - name: Upload Evaluation Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report
          path: backend/evals/results/eval_dashboard.md
